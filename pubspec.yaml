name: agricola_dashboard
description: Agricola Web Dashboard — merchant & farmer management portal.
publish_to: 'none'
version: 0.9.0+10

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  agricola_core:
    path: ../agricola-core
  flutter_riverpod: ^2.6.1
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  dio: ^5.9.0
  go_router: ^14.8.1
  google_sign_in: ^6.2.2
  fpdart: ^1.2.0
  fl_chart: ^0.70.2
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
